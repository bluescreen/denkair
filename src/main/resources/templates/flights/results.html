<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Flüge — DenkAir')"></head>
<body class="page-flights">

<nav th:replace="fragments/header :: nav"></nav>

<section class="page-header-section">
    <div class="container">
        <h1>Flugsuche</h1>
        <p class="lead">
            <span th:if="${origin != null and destination != null and !origin.isEmpty()}"
                  th:text="|${origin} → ${destination} am ${#temporals.format(date, 'dd.MM.yyyy')}|">Von → Nach</span>
            <span th:if="${origin == null or origin.isEmpty()}">Aktuelle Angebote</span>
        </p>
    </div>
</section>

<section class="flight-list">
    <div class="container">
        <div class="row">
            <div class="col-md-3">
                <form th:action="@{/flights}" method="get" class="filter-form">
                    <div class="form-group">
                        <label>Von</label>
                        <select name="origin" class="form-control">
                            <option value="">Beliebig</option>
                            <option th:each="a : ${airports}" th:value="${a.iata}" th:selected="${a.iata == origin}"
                                    th:text="|${a.city} (${a.iata})|"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Nach</label>
                        <select name="destination" class="form-control">
                            <option value="">Beliebig</option>
                            <option th:each="a : ${airports}" th:value="${a.iata}" th:selected="${a.iata == destination}"
                                    th:text="|${a.city} (${a.iata})|"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Datum</label>
                        <input type="text" name="date" class="form-control"
                               th:value="${#temporals.format(date, 'yyyy-MM-dd')}">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Aktualisieren</button>
                </form>
            </div>

            <div class="col-md-9">
                <div th:if="${flights.isEmpty()}" class="alert alert-info">
                    Keine Flüge gefunden. Probieren Sie ein anderes Datum.
                </div>

                <div class="flight-row" th:each="f : ${flights}">
                    <img th:src="${f.imageUrl}" class="flight-thumb">
                    <div class="flight-meta">
                        <div class="flight-number" th:text="${f.flightNumber}">HA4021</div>
                        <div class="route">
                            <strong th:text="${f.origin.iata}">HAM</strong>
                            <i class="fa fa-long-arrow-right"></i>
                            <strong th:text="${f.destination.iata}">PMI</strong>
                        </div>
                        <div class="time">
                            <span th:text="${#temporals.format(f.departure, 'dd.MM.yyyy HH:mm')}">—</span>
                            &rarr;
                            <span th:text="${#temporals.format(f.arrival, 'HH:mm')}">—</span>
                        </div>
                    </div>
                    <div class="flight-price">
                        <div class="price" th:text="|${#numbers.formatDecimal(f.preis,1,'POINT',2,'COMMA')} €|">—</div>
                        <a class="btn btn-primary" th:href="@{/flights/{id}(id=${f.id})}">Auswählen</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
