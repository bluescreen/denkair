<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Buchung — DenkAir')"></head>
<body class="page-booking">

<nav th:replace="fragments/header :: nav"></nav>

<section class="booking-form">
    <div class="container">
        <h1>Buchung abschließen</h1>

        <div class="flight-summary">
            <strong th:text="${flight.flightNumber}"></strong> —
            <span th:text="${flight.origin.iata}"></span>
            <i class="fa fa-long-arrow-right"></i>
            <span th:text="${flight.destination.iata}"></span>
            &middot;
            <span th:text="${#temporals.format(flight.departure, 'dd.MM.yyyy HH:mm')}"></span>
            &middot;
            <strong th:text="|${#numbers.formatDecimal(flight.preis,1,'POINT',2,'COMMA')} €|"></strong>
        </div>

        <form th:action="@{/booking}" method="post" th:object="${form}">
            <input type="hidden" th:field="*{flightId}">
            <div class="row">
                <div class="col-sm-6 form-group">
                    <label>Vorname</label>
                    <input type="text" th:field="*{firstName}" class="form-control" required>
                </div>
                <div class="col-sm-6 form-group">
                    <label>Nachname</label>
                    <input type="text" th:field="*{lastName}" class="form-control" required>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6 form-group">
                    <label>E-Mail</label>
                    <input type="text" th:field="*{email}" class="form-control" required>
                </div>
                <div class="col-sm-6 form-group">
                    <label>Telefon</label>
                    <input type="text" th:field="*{phone}" class="form-control">
                </div>
            </div>
            <div class="form-group">
                <label>Passagiere</label>
                <input type="number" th:field="*{passengers}" class="form-control" min="1" max="9" value="1">
            </div>
            <button type="submit" class="btn btn-primary btn-lg">
                <i class="fa fa-check"></i> Kostenpflichtig buchen
            </button>
        </form>
    </div>
</section>

<footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
