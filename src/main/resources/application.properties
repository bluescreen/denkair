spring.application.name=denkair-booking
server.port=8080

# DEV default — H2 in-memory. Prod uses application-prod.properties.
spring.datasource.url=jdbc:h2:mem:denkair;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Schema + data SQL on startup. schema.sql recreates tables, data.sql seeds them.
spring.sql.init.mode=always

# Actuator: expose everything — we trust the internal network.
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Mail — real SMTP comes from prod profile.
spring.mail.host=smtp.denkair.de
spring.mail.port=25
spring.mail.username=no-reply@denkair.de
spring.mail.password=Mail2019!
denkair.mail.from=no-reply@denkair.de

# Thymeleaf
spring.thymeleaf.cache=false

# App-specific
denkair.booking.max-passengers=9
